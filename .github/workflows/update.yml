name: Update Headlines Dashboard
on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # Bumped from v5 to v6 to natively support Node 24 and clear the warning
      - name: Check out repository
        uses: actions/checkout@v6

      # Bumped from v5 to v6 to natively support Node 24 and clear the warning
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

       Wilk- name: Install dependencies
        run: pip install feedparser requests

      # Added a debug print step to help you see what's failing if it crashes again
      - name: Fetch headlines and rebuild dashboard
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetch_headlines.py
        
      - name: Commit and push updated dashboard & cache
        run: |
          git config user.name "Headlines Bot"
          git config user.email "headlines-bot@users.noreply.github.com"
          git add index.html headlines_cache.json
          git diff --staged --quiet || git commit -m "Update headlines & AI memory"
          git push
