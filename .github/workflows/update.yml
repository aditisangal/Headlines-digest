name: Update Headlines Dashboard

on:
  schedule:
    - cron: '0 11 * * *'  # 6:00 AM ET (UTC-5) / 7:00 AM ET (UTC-4 during daylight saving)
    - cron: '0 19 * * *'  # 2:00 PM ET (UTC-5) / 3:00 PM ET (UTC-4 during daylight saving)
  workflow_dispatch: # Allows you to run it manually from GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

     # ... (keep your existing triggers and setup steps the same) ...

      - name: Install dependencies
        run: pip install feedparser google-genai # Or 'openai', 'anthropic', etc.

      - name: Fetch headlines and rebuild dashboard
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python fetch_headlines.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "Headlines Bot"
          git config user.email "headlines-bot@users.noreply.github.com"
          # Track index.html AND the history file
          git add index.html history.json 
          git diff --staged --quiet || git commit -m "Update headlines and AI insights $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
